name: iOS Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build iOS for simulator
        run: |
          flutter build ios --simulator --no-codesign

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/Runner.app
          retention-days: 5

  build-ipa:
    runs-on: macos-latest
    needs: build-ios
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build iOS for release (unsigned)
        run: |
          flutter build ios --release --no-codesign

      - name: Create IPA (unsigned zip)
        run: |
          cd build/ios/iphoneos
          zip -r ../Runner.ipa Runner.app

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: build/ios/Runner.ipa
          retention-days: 30