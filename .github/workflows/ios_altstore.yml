name: iOS Build - AltStore Ready

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build for simulator (unsigned)
        run: |
          flutter build ios --simulator --no-codesign

      - name: Create unsigned release build
        run: |
          flutter build ios --release --no-codesign

      - name: Create IPA (zip with .ipa extension)
        run: |
          cd build/ios/iphoneos
          zip -r ../Runner.ipa Runner.app

      - name: Upload IPA for AltStore
        uses: actions/upload-artifact@v4
        with:
          name: BLISS-AltStore
          path: build/ios/Runner.ipa
          retention-days: 7

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: BLISS-simulator
          path: build/ios/iphonesimulator/Runner.app
          retention-days: 7