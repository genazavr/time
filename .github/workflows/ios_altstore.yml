name: iOS Build - AltStore Ready

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build for simulator (unsigned)
        run: |
          flutter build ios --simulator --no-codesign

      - name: Create unsigned release build
        run: |
          flutter build ios --release --no-codesign

      - name: Package for AltStore (correct IPA structure)
        run: |
          mkdir -p build/ios/AltStore
          mkdir -p build/ios/AltStore/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/AltStore/Payload/
          cd build/ios/AltStore
          zip -r Runner.ipa Payload

      - name: Verify IPA structure
        run: |
          unzip -l build/ios/AltStore/Runner.ipa
          ls -la build/ios/AltStore/Runner.ipa

      - name: Upload IPA for AltStore
        uses: actions/upload-artifact@v4
        with:
          name: BLISS-AltStore
          path: build/ios/AltStore/Runner.ipa
          retention-days: 7